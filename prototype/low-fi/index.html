<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智能体工作台 · V0.1.1 低保真原型</title>
  <style>
    :root {
      --bg: #f6f7f8;
      --panel: #ffffff;
      --line: #d7dce2;
      --text: #1f2933;
      --muted: #687382;
      --soft: #eef1f4;
      --blue: #2563eb;
      --green: #168a4a;
      --orange: #c56a12;
      --red: #c7352d;
      --purple: #7057c2;
      --dark: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    button, textarea, input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: #9da7b4;
      background: #f9fafb;
    }

    button.primary {
      border-color: var(--dark);
      background: var(--dark);
      color: #fff;
    }

    button.danger {
      border-color: var(--red);
      color: var(--red);
    }

    button.ghost {
      background: transparent;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .5;
    }

    .app {
      display: grid;
      grid-template-columns: 180px minmax(640px, 1fr) 280px;
      grid-template-rows: 56px minmax(0, 1fr) auto;
      height: 100vh;
    }

    .topbar {
      grid-column: 1 / 4;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      padding: 0 16px;
    }

    .brand {
      width: 164px;
      font-weight: 700;
      font-size: 16px;
    }

    .search {
      flex: 1;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: flex;
      align-items: center;
      color: var(--muted);
      padding: 0 12px;
      background: #fafafa;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .pill.blue { background: #eaf1ff; color: var(--blue); border-color: #bfceee; }
    .pill.green { background: #e9f7ef; color: var(--green); border-color: #bfe0ca; }
    .pill.orange { background: #fff3e6; color: var(--orange); border-color: #efd0a8; }
    .pill.red { background: #fff0ef; color: var(--red); border-color: #efc0bd; }
    .pill.purple { background: #f0edff; color: var(--purple); border-color: #d2c9ff; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--soft);
      display: grid;
      place-items: center;
      font-weight: 700;
      color: var(--muted);
    }

    .sidebar {
      grid-row: 2 / 4;
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 14px 10px;
    }

    .nav-item {
      width: 100%;
      display: block;
      margin-bottom: 6px;
      text-align: left;
      border-color: transparent;
      background: transparent;
    }

    .nav-item.active {
      background: var(--soft);
      border-color: var(--line);
      font-weight: 700;
    }

    .main {
      grid-column: 2;
      grid-row: 2;
      overflow: auto;
      padding: 18px 20px 96px;
    }

    .rightbar {
      grid-column: 3;
      grid-row: 2 / 4;
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 16px;
      overflow: auto;
    }

    .event-stream {
      grid-column: 2;
      grid-row: 3;
      border-top: 1px solid var(--line);
      background: var(--panel);
      min-height: 44px;
      max-height: 180px;
      overflow: auto;
    }

    .event-head {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }

    .event-list {
      margin: 0;
      padding: 10px 16px 14px 34px;
      color: var(--muted);
    }

    .event-stream.collapsed {
      max-height: 44px;
      overflow: hidden;
    }

    h1, h2, h3 {
      margin: 0;
      line-height: 1.25;
    }

    h1 { font-size: 24px; }
    h2 { font-size: 18px; }
    h3 { font-size: 15px; }

    p {
      margin: 0;
      line-height: 1.7;
    }

    .muted {
      color: var(--muted);
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      margin-bottom: 14px;
    }

    .mini-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafafa;
      padding: 12px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      color: var(--text);
    }

    ol, ul {
      margin: 10px 0 0;
      padding-left: 22px;
      line-height: 1.8;
    }

    .chain {
      display: flex;
      align-items: stretch;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 3px;
      margin-bottom: 14px;
    }

    .chain-step {
      min-width: 116px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .chain-step.active {
      border-color: var(--blue);
      background: #edf4ff;
      color: var(--blue);
      font-weight: 700;
    }

    .chain-step.done {
      border-color: #bfe0ca;
      background: #f2fbf5;
      color: var(--green);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
    }

    .status-row:last-child {
      border-bottom: 0;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: 10px;
    }

    .column {
      min-height: 400px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafafa;
      padding: 10px;
    }

    .column h3 {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .task-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px;
      margin-bottom: 10px;
    }

    .task-card strong {
      display: block;
      margin: 5px 0 8px;
      line-height: 1.35;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }

    .tab {
      border: 0;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      background: transparent;
      padding: 10px 12px;
    }

    .tab.active {
      border-bottom-color: var(--dark);
      font-weight: 700;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .data-table th, .data-table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }

    .data-table th {
      color: var(--muted);
      font-weight: 600;
      background: #fafafa;
    }

    .diff {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111827;
      color: #e5e7eb;
      padding: 12px;
      overflow: auto;
      line-height: 1.55;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }

    .diff .add { color: #86efac; }
    .diff .del { color: #fca5a5; }

    .review-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 14px;
      align-items: start;
    }

    .file-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-radius: 6px;
      margin-top: 8px;
    }

    .file-row.active {
      border-color: var(--blue);
      background: #edf4ff;
    }

    .decision-bar {
      position: sticky;
      bottom: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
      box-shadow: 0 -8px 20px rgba(17, 24, 39, .08);
    }

    .decision-bar .right {
      justify-self: end;
    }

    .more-menu {
      position: relative;
    }

    .menu-panel {
      position: absolute;
      left: 50%;
      bottom: 42px;
      transform: translateX(-50%);
      width: 190px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 8px;
      box-shadow: 0 12px 28px rgba(17, 24, 39, .14);
    }

    .menu-panel button {
      width: 100%;
      margin-bottom: 6px;
      text-align: left;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      background: rgba(17, 24, 39, .42);
      padding: 24px;
    }

    .modal {
      width: min(520px, 100%);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
      box-shadow: 0 24px 80px rgba(17, 24, 39, .3);
    }

    .modal .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

    .modal-backdrop.show {
      display: grid;
    }

    .placeholder {
      max-width: 720px;
      margin: 40px auto;
      text-align: center;
    }

    .workflow-card {
      text-align: left;
      max-width: 520px;
      margin: 16px auto 0;
    }

    .small-note {
      border-left: 3px solid var(--orange);
      background: #fff9ef;
      padding: 10px 12px;
      color: #5c3a10;
      border-radius: 4px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">智能体工作台</div>
      <div class="search">搜索任务、工作流或审查包</div>
      <span class="pill">严格模式</span>
      <button id="createGoal">创建目标</button>
      <div class="avatar">你</div>
    </header>

    <aside class="sidebar" id="nav"></aside>
    <main class="main" id="main"></main>
    <aside class="rightbar" id="rightbar"></aside>
    <section class="event-stream" id="eventStream"></section>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal"></div>
  </div>

  <script>
    const sampleGoal = "修复登录页错误提示不显示，并补充测试。";
    const plan = [
      "阅读登录页相关代码，定位错误提示组件",
      "确认错误提示未显示的根因",
      "修复错误提示显示逻辑",
      "在登录页测试文件中补充错误提示相关用例",
      "运行单元测试与组件测试",
      "生成改动总结与审查建议"
    ];
    const checks = [
      "输入错误密码后，登录页能展示对应错误提示",
      "新增至少 2 条针对错误提示的测试用例，且全部通过",
      "不引入新的代码检查或类型检查告警"
    ];
    const files = [
      {
        name: "src/login/Login.tsx",
        change: "+12 / -3",
        diff: '<span class="del">- setErrorMessage("")</span>\\n<span class="add">+ setErrorMessage(result.errorMessage)</span>\\n\\n<span class="add">+ {errorMessage && (</span>\\n<span class="add">+   &lt;ErrorMessage&gt;{errorMessage}&lt;/ErrorMessage&gt;</span>\\n<span class="add">+ )}</span>'
      },
      {
        name: "src/login/Login.module.css",
        change: "+4 / -0",
        diff: '<span class="add">+ .errorMessage {</span>\\n<span class="add">+   margin-top: 8px;</span>\\n<span class="add">+   color: var(--color-danger);</span>\\n<span class="add">+ }</span>'
      },
      {
        name: "src/login/Login.test.tsx",
        change: "+28 / -0",
        diff: '<span class="add">+ it("登录失败时展示错误提示", async () =&gt; {</span>\\n<span class="add">+   await submitLoginForm({ username: "demo", password: "wrong" })</span>\\n<span class="add">+   expect(screen.getByText("账号或密码不正确")).toBeVisible()</span>\\n<span class="add">+ })</span>'
      }
    ];

    const state = {
      page: "home",
      taskStatus: "待处理",
      exception: "",
      feedback: "",
      selectedTab: {
        task: "概览",
        run: "时间线"
      },
      selectedFile: 0,
      goal: sampleGoal,
      planAgent: "空闲",
      workAgent: "空闲",
      reviewAgent: "空闲",
      reviewSuggestion: "改动范围合理，测试覆盖充分，可接受。",
      chainLevel: 0,
      decision: "",
      workflowSaved: false,
      eventCollapsed: false,
      menuOpen: false,
      events: [
        "14:06 任务-001 等待审查",
        "14:06 审查包已生成",
        "14:06 测试全部通过",
        "14:05 运行测试中",
        "14:04 工作智能体新增了 src/login/Login.test.tsx",
        "14:03 工作智能体修改了 src/login/Login.module.css",
        "14:03 工作智能体修改了 src/login/Login.tsx",
        "14:01 工作智能体已开始",
        "14:01 上下文已生成",
        "14:00 独立工作区已创建（branch: fix/login-error-tip）",
        "14:00 任务-001 已创建"
      ]
    };

    function addEvent(text) {
      state.events.unshift(text);
      renderEventStream();
    }

    function setPage(page) {
      state.page = page;
      state.menuOpen = false;
      if (page === "home") state.chainLevel = 0;
      if (page === "plan") state.chainLevel = 2;
      if (page === "taskDetail") state.chainLevel = Math.max(state.chainLevel, 3);
      if (page === "runDetail") state.chainLevel = Math.max(state.chainLevel, 5);
      if (page === "review") state.chainLevel = Math.max(state.chainLevel, 7);
      render();
    }

    function chain() {
      const labels = [
        "准备输入目标",
        "目标已输入",
        "计划已生成",
        "智能体执行中",
        "执行证据已生成",
        "验证已通过",
        "审查包已生成",
        "等待人工决策",
        state.decision || "已接受 / 已拒绝 / 重新执行 / 复查中",
        "已沉淀为工作流"
      ];
      return `<div class="chain">${labels.map((label, index) => {
        const status = index < state.chainLevel ? "done" : index === state.chainLevel ? "active" : "";
        return `<div class="chain-step ${status}">${index === 0 ? "" : index + ". "}${label}</div>`;
      }).join("")}</div>`;
    }

    function layout(title, subtitle, body, actions = "") {
      return `
        <div class="page-head">
          <div>
            <h1>${title}</h1>
            ${subtitle ? `<p class="muted">${subtitle}</p>` : ""}
          </div>
          <div class="toolbar">${actions}</div>
        </div>
        ${chain()}
        ${body}
      `;
    }

    function renderNav() {
      const navs = [
        ["home", "首页"],
        ["tasks", "任务"],
        ["workflow", "工作流"],
        ["agents", "智能体"],
        ["settings", "设置"]
      ];
      document.getElementById("nav").innerHTML = navs.map(([page, label]) => `
        <button class="nav-item ${navActive(page)}" onclick="setPage('${page}')">${label}</button>
      `).join("");
    }

    function navActive(page) {
      if (page === "tasks" && ["tasks", "taskDetail", "runDetail", "review", "plan"].includes(state.page)) return "active";
      return state.page === page ? "active" : "";
    }

    function renderRightbar() {
      document.getElementById("rightbar").innerHTML = `
        <h2>状态栏</h2>
        <div class="card" style="margin-top:12px">
          ${statusRow("计划智能体", state.planAgent)}
          ${statusRow("工作智能体", state.workAgent === "工作中" ? "工作中 · 任务-001 · 已运行 4 分 12 秒" : state.workAgent)}
          ${statusRow("审查智能体", state.reviewAgent)}
        </div>
        <div class="card">
          <h3>系统健康</h3>
          ${statusRow("卡住任务", "0")}
          ${statusRow("执行失败", "0")}
          ${statusRow("验证未通过", "0")}
          ${statusRow("待人工处理", state.taskStatus === "待审查" ? "1" : "0")}
        </div>
        <div class="card">
          ${statusRow("安全模式", "严格")}
          ${statusRow("自动合并", "关闭")}
          ${statusRow("外部网络", "受限")}
          ${statusRow("密钥访问", "禁止")}
        </div>
        <div class="small-note">智能体可以执行任务，接受结果与合入需要人确认。</div>
      `;
    }

    function statusRow(label, value) {
      return `<div class="status-row"><span class="muted">${label}</span><strong>${value}</strong></div>`;
    }

    function renderEventStream() {
      const latest = state.events[0] || "暂无事件";
      const el = document.getElementById("eventStream");
      el.className = `event-stream ${state.eventCollapsed ? "collapsed" : ""}`;
      el.innerHTML = `
        <div class="event-head">
          <span>事件流</span>
          <div class="toolbar">
            <span class="muted">${state.eventCollapsed ? latest : ""}</span>
            <button class="ghost" onclick="toggleEvents()">${state.eventCollapsed ? "展开" : "折叠"}</button>
          </div>
        </div>
        <ol class="event-list">${state.events.map(event => `<li>${event}</li>`).join("")}</ol>
      `;
    }

    function toggleEvents() {
      state.eventCollapsed = !state.eventCollapsed;
      renderEventStream();
    }

    function homePage() {
      return layout(
        "首页",
        "输入目标，查看当前任务概览。",
        `
          <div class="grid two">
            <section class="card">
              <h2>目标输入</h2>
              <p class="muted">样例目标已填入，可直接生成任务计划。</p>
              <textarea id="goalInput">${state.goal}</textarea>
              <div class="toolbar" style="margin-top:10px">
                <button class="primary" onclick="generatePlan()">生成任务计划</button>
              </div>
            </section>
            <section class="card">
              <h2>当前任务概览</h2>
              ${taskCardHtml(true)}
            </section>
          </div>
          <section class="card">
            <h2>最近事件</h2>
            <ol>${state.events.slice(0, 5).map(event => `<li>${event}</li>`).join("")}</ol>
          </section>
        `
      );
    }

    function generatePlan() {
      const input = document.getElementById("goalInput");
      state.goal = input.value.trim() || sampleGoal;
      state.planAgent = "工作中";
      state.chainLevel = 1;
      addEvent("目标已输入，正在生成任务计划");
      renderRightbar();
      setTimeout(() => {
        state.planAgent = "空闲";
        state.chainLevel = 2;
        addEvent("任务计划已生成");
        setPage("plan");
      }, 350);
    }

    function planPage() {
      return layout(
        "计划确认页",
        "确认系统建议计划后，工作智能体才会开始执行。",
        `
          <section class="card">
            <h2>原始目标</h2>
            <p>${state.goal}</p>
          </section>
          <div class="grid two">
            <section class="card">
              <h2>系统建议计划</h2>
              <ol>${plan.map(item => `<li>${item}</li>`).join("")}</ol>
            </section>
            <section class="card">
              <h2>验收标准</h2>
              <ol>${checks.map(item => `<li>${item}</li>`).join("")}</ol>
              <div class="small-note">风险提示：本次改动涉及登录路径，建议保留人工审查。</div>
            </section>
          </div>
          <div class="toolbar">
            <button class="primary" onclick="confirmPlan()">确认并执行</button>
            <button onclick="saveDraft()">保存草稿</button>
          </div>
        `
      );
    }

    function confirmPlan() {
      state.taskStatus = "执行中";
      state.exception = "";
      state.workAgent = "工作中";
      state.chainLevel = 3;
      addEvent("用户确认计划，工作智能体开始执行");
      setPage("taskDetail");
    }

    function saveDraft() {
      state.taskStatus = "待处理";
      addEvent("计划已保存为草稿");
      setPage("home");
    }

    function tasksPage() {
      const cols = ["待处理", "执行中", "验证中", "待审查", "已完成"];
      return layout(
        "任务板",
        "五列展示主任务状态，异常只作为标签出现。",
        `<section class="board">${cols.map(col => `
          <div class="column">
            <h3>${col}<span class="pill">${state.taskStatus === col ? 1 : 0}</span></h3>
            ${state.taskStatus === col ? taskCardHtml(false) : `<p class="muted">暂无任务</p>`}
          </div>
        `).join("")}</section>`
      );
    }

    function taskCardHtml(compact) {
      const statusClass = state.taskStatus === "已完成" ? "green" : state.taskStatus === "待审查" ? "orange" : state.taskStatus === "执行中" ? "blue" : "purple";
      return `
        <button class="task-card" onclick="setPage('taskDetail')">
          <span class="pill ${statusClass}">${state.taskStatus}</span>
          ${state.exception ? `<span class="pill red">${state.exception}</span>` : ""}
          <strong>任务-001 · 修复登录页错误提示不显示</strong>
          <div class="muted">负责智能体：工作智能体</div>
          <div class="muted">已运行时长：4 分 12 秒</div>
          ${compact ? "" : `
            <div class="meta">
              <span class="pill green">验证结果：已通过</span>
              <span class="pill">风险等级：低</span>
            </div>
            ${state.taskStatus === "待审查" ? `<button style="margin-top:8px" onclick="event.stopPropagation(); setPage('review')">查看审查包</button>` : ""}
          `}
        </button>
      `;
    }

    function taskDetailPage() {
      return layout(
        "任务-001 · 修复登录页错误提示不显示",
        "任务详情页展示状态、上下文、验收标准和历史运行。",
        `
          <section class="card">
            <div class="toolbar">
              <span class="pill blue">${state.taskStatus}</span>
              ${state.exception ? `<span class="pill red">${state.exception}</span>` : ""}
              <span class="pill">负责智能体：工作智能体</span>
              <span class="pill">工作区：fix/login-error-tip</span>
              <span class="pill">分支：fix/login-error-tip</span>
            </div>
          </section>
          <div class="tabs">${["概览", "上下文", "验收标准", "历史运行"].map(tab => `<button class="tab ${state.selectedTab.task === tab ? "active" : ""}" onclick="setTaskTab('${tab}')">${tab}</button>`).join("")}</div>
          ${taskTabContent()}
        `,
        `
          <button class="primary" onclick="setPage('runDetail')">查看运行详情</button>
          <button onclick="stopTask()">停止</button>
          <button onclick="retryTask()">重试</button>
          <button onclick="setPage('review')">查看审查包</button>
        `
      );
    }

    function setTaskTab(tab) {
      state.selectedTab.task = tab;
      render();
    }

    function taskTabContent() {
      if (state.selectedTab.task === "上下文") {
        return `<section class="card">
          ${statusRow("角色", "工作智能体")}
          ${statusRow("任务", state.goal)}
          ${statusRow("验收标准", "输入错误密码展示提示；新增至少 2 条测试；不引入新告警")}
          ${statusRow("项目规则", "使用项目内通用的错误提示组件，不引入新依赖")}
          ${statusRow("工作区", "fix/login-error-tip（独立分支）")}
          ${statusRow("需要运行的验证", "单元测试、组件测试、代码检查、类型检查")}
          ${statusRow("上一次反馈", state.feedback || "无")}
        </section>`;
      }
      if (state.selectedTab.task === "验收标准") {
        return `<section class="card"><ol>${checks.map(item => `<li>${item} <span class="pill green">已满足</span></li>`).join("")}</ol></section>`;
      }
      if (state.selectedTab.task === "历史运行") {
        return `<section class="card">
          <table class="data-table">
            <thead><tr><th>运行编号</th><th>开始时间</th><th>结束时间</th><th>最终结果</th><th>验证结果</th><th>触发来源</th><th></th></tr></thead>
            <tbody><tr><td>运行-001</td><td>14:01</td><td>14:06</td><td>已完成</td><td>已通过</td><td>确认并执行</td><td><button onclick="setPage('runDetail')">查看运行详情</button></td></tr></tbody>
          </table>
        </section>`;
      }
      return `<section class="card">
        <h2>当前运行摘要</h2>
        <p>工作智能体已完成代码修改，验证结果全部通过，审查包已生成。</p>
        <div class="meta">
          <span class="pill green">测试：通过（28 / 28）</span>
          <span class="pill green">代码检查：通过（0 警告）</span>
          <span class="pill green">类型检查：通过（0 错误）</span>
        </div>
      </section>`;
    }

    function stopTask() {
      showConfirm("停止当前运行？", "停止后任务保留当前主状态，并显示已停止标签。", () => {
        state.exception = "已停止";
        addEvent("任务-001 当前运行已停止");
        closeModal();
        render();
      });
    }

    function retryTask() {
      state.taskStatus = "执行中";
      state.exception = "";
      state.workAgent = "工作中";
      state.chainLevel = 3;
      addEvent("任务-001 已开始重试");
      render();
    }

    function runDetailPage() {
      return layout(
        "执行详情页",
        "展示一次运行的完整证据链。",
        `
          <div class="tabs">${["时间线", "上下文快照", "日志", "改动", "验证"].map(tab => `<button class="tab ${state.selectedTab.run === tab ? "active" : ""}" onclick="setRunTab('${tab}')">${tab}</button>`).join("")}</div>
          ${runTabContent()}
          <div class="toolbar">
            <button onclick="setPage('tasks')">返回任务板</button>
            <button class="primary" onclick="enterReviewFromRun()">查看审查包</button>
          </div>
          <p class="muted" style="margin-top:8px">验证未通过时无法查看审查包，请先重试或人工查看日志。</p>
        `
      );
    }

    function setRunTab(tab) {
      state.selectedTab.run = tab;
      render();
    }

    function runTabContent() {
      if (state.selectedTab.run === "上下文快照") {
        return contextSnapshotContent();
      }
      if (state.selectedTab.run === "日志") {
        return `<section class="card"><pre class="diff">14:02 读取 src/login/Login.tsx\\n14:03 写入错误提示状态\\n14:04 新增登录失败测试\\n14:05 运行单元测试与组件测试\\n14:06 测试全部通过</pre></section>`;
      }
      if (state.selectedTab.run === "改动") {
        return `<section class="card">
          <h2>修改文件汇总</h2>
          <p>共 3 个文件被修改。总计：+44 / -3。风险等级：低。</p>
          ${fileTable()}
          <h3 style="margin-top:14px">静态差异样例</h3>
          <pre class="diff">${files[0].diff}</pre>
          <h3 style="margin-top:14px">改动摘要</h3>
          <ul><li>修复登录失败时错误提示未传入错误提示组件的问题。</li><li>补充错误提示显示区域。</li><li>新增登录失败场景测试，覆盖密码错误与账号不存在两种场景。</li></ul>
        </section>`;
      }
      if (state.selectedTab.run === "验证") {
        return `<section class="card">
          <div class="grid three">
            <div class="mini-panel"><h3>测试</h3><p class="pill green">通过（28 / 28）</p></div>
            <div class="mini-panel"><h3>代码检查</h3><p class="pill green">通过（0 警告）</p></div>
            <div class="mini-panel"><h3>类型检查</h3><p class="pill green">通过（0 错误）</p></div>
          </div>
        </section>`;
      }
      return `<section class="card"><h2>执行时间线</h2><ol>
        <li>14:00 任务-001 已创建</li>
        <li>14:00 独立工作区已创建（branch: fix/login-error-tip）</li>
        <li>14:01 上下文已生成</li>
        <li>14:01 工作智能体已开始</li>
        <li>14:03 工作智能体修改了 src/login/Login.tsx</li>
        <li>14:04 工作智能体新增了 src/login/Login.test.tsx</li>
        <li>14:06 测试全部通过</li>
        <li>14:06 审查包已生成</li>
      </ol></section>`;
    }

    function enterReviewFromRun() {
      state.taskStatus = "待审查";
      state.workAgent = "空闲";
      state.chainLevel = 7;
      addEvent("审查包已生成");
      setPage("review");
    }

    function contextSnapshotContent() {
      return `<section class="card">
        ${statusRow("角色", "工作智能体")}
        ${statusRow("任务", state.goal)}
        ${statusRow("验收标准", "输入错误密码展示提示；新增至少 2 条测试；不引入新告警")}
        ${statusRow("项目规则", "使用项目内通用的错误提示组件，不引入新依赖")}
        ${statusRow("工作区", "fix/login-error-tip（独立分支）")}
        ${statusRow("需要运行的验证", "单元测试、组件测试、代码检查、类型检查")}
        ${statusRow("上一次反馈", state.feedback || "无")}
      </section>`;
    }

    function fileTable() {
      return `<table class="data-table">
        <thead><tr><th>文件</th><th>类型</th><th>变更</th></tr></thead>
        <tbody>
          <tr><td>src/login/Login.tsx</td><td>修改</td><td>+12 / -3</td></tr>
          <tr><td>src/login/Login.module.css</td><td>修改</td><td>+4 / -0</td></tr>
          <tr><td>src/login/Login.test.tsx</td><td>新增</td><td>+28 / -0</td></tr>
        </tbody>
      </table>`;
    }

    function reviewPage() {
      return layout(
        "审查包页",
        "最终人工决策入口。文件清单点击后只更新同页差异预览。",
        `
          <div class="review-layout">
            <div>
              <section class="card">
                <h2>任务回顾</h2>
                <p>${state.goal}</p>
              </section>
              <section class="card">
                <h2>智能体总结</h2>
                <p>登录失败时，错误状态被覆盖导致提示不渲染。已在登录提交逻辑里保留 errorMessage 状态，并在 Login.tsx 中渲染该提示；新增 2 条测试覆盖密码错误与账号不存在两种场景。</p>
              </section>
              <section class="card">
                <h2>验收标准结果</h2>
                <ol>${checks.map(item => `<li>${item} <span class="pill green">通过</span></li>`).join("")}</ol>
              </section>
              <section class="card">
                <h2>验证结果</h2>
                <div class="meta">
                  <span class="pill green">测试：通过（28 / 28）</span>
                  <span class="pill green">代码检查：通过（0 警告）</span>
                  <span class="pill green">类型检查：通过（0 错误）</span>
                </div>
              </section>
              <section class="card">
                <h2>风险提示</h2>
                <p>本次改动涉及登录路径，建议人工再快速检查一次错误提示的视觉表现。</p>
              </section>
              <section class="card">
                <h2>审查建议</h2>
                <p>${state.reviewSuggestion}</p>
              </section>
            </div>
            <aside class="card">
              <h2>修改文件清单</h2>
              ${files.map((file, index) => `<button class="file-row ${state.selectedFile === index ? "active" : ""}" onclick="selectFile(${index})"><span>${file.name}</span><strong>${file.change}</strong></button>`).join("")}
              <h2 style="margin-top:16px">同页差异预览</h2>
              <p class="muted">${files[state.selectedFile].name}</p>
              <pre class="diff">${files[state.selectedFile].diff}</pre>
            </aside>
          </div>
          <div class="decision-bar">
            <button class="danger" onclick="openReject()">拒绝并反馈</button>
            <div class="more-menu">
              <button onclick="toggleMenu()">更多操作</button>
              ${state.menuOpen ? `<div class="menu-panel">
                <button onclick="openRerun()">重新执行</button>
                <button onclick="reviewAgain()">让审查智能体复查</button>
              </div>` : ""}
            </div>
            <button class="primary right" onclick="openAccept()">接受结果</button>
          </div>
        `
      );
    }

    function selectFile(index) {
      state.selectedFile = index;
      render();
    }

    function toggleMenu() {
      state.menuOpen = !state.menuOpen;
      render();
    }

    function openAccept() {
      showConfirm("确认接受结果？", "接受后任务会进入已完成列。", () => {
        state.taskStatus = "已完成";
        state.exception = "";
        state.decision = "已接受";
        state.chainLevel = 8;
        addEvent("任务-001 已接受");
        closeModal();
        openWorkflowPrompt();
      });
    }

    function openWorkflowPrompt() {
      showModal(`
        <h2>是否保存为工作流？</h2>
        <p class="muted">这次任务已成功完成。你可以把这次流程保存为工作流，后续遇到类似目标时复用。</p>
        <div class="actions">
          <button onclick="skipWorkflow()">暂不保存</button>
          <button class="primary" onclick="saveWorkflow()">保存为工作流</button>
        </div>
      `);
    }

    function saveWorkflow() {
      state.workflowSaved = true;
      state.chainLevel = 9;
      addEvent("已保存工作流：前端问题修复");
      closeModal();
      setPage("workflow");
    }

    function skipWorkflow() {
      addEvent("任务-001 已完成，未保存为工作流");
      closeModal();
      setPage("tasks");
    }

    function openReject() {
      showModal(`
        <h2>拒绝并反馈</h2>
        <p class="muted">反馈会进入下一次运行上下文。</p>
        <textarea id="feedbackInput" placeholder="请填写需要调整的地方"></textarea>
        <p id="feedbackError" class="muted" style="color: var(--red); display:none">反馈必填。</p>
        <div class="actions">
          <button onclick="closeModal()">取消</button>
          <button class="primary" onclick="submitReject()">提交反馈</button>
        </div>
      `);
    }

    function submitReject() {
      const input = document.getElementById("feedbackInput");
      const value = input.value.trim();
      if (!value) {
        document.getElementById("feedbackError").style.display = "block";
        return;
      }
      state.feedback = value;
      state.taskStatus = "执行中";
      state.exception = "已拒绝";
      state.workAgent = "工作中";
      state.decision = "已拒绝";
      state.chainLevel = 8;
      addEvent("任务-001 已被拒绝，反馈已进入下一次运行上下文");
      closeModal();
      state.selectedTab.task = "上下文";
      setPage("taskDetail");
    }

    function openRerun() {
      showConfirm("确认重新执行？", "重新执行不会新增反馈，会按原计划新建一次运行。", () => {
        state.taskStatus = "执行中";
        state.exception = "";
        state.workAgent = "工作中";
        state.decision = "重新执行";
        state.chainLevel = 8;
        addEvent("任务-001 已重新执行");
        closeModal();
        setPage("taskDetail");
      });
    }

    function reviewAgain() {
      state.reviewAgent = "工作中";
      state.reviewSuggestion = "审查智能体正在复查";
      state.decision = "复查中";
      state.chainLevel = 8;
      addEvent("审查智能体已开始复查任务-001");
      render();
    }

    function placeholderPage(kind) {
      const copy = {
        workflow: ["工作流", "这里后续用于沉淀可复用的成功任务流程。", "V0.1.1 暂未开放工作流管理。"],
        agents: ["智能体", "这里后续用于查看计划智能体、工作智能体、审查智能体的档案与状态。", "V0.1.1 暂未开放智能体管理。"],
        settings: ["设置", "这里后续用于调整安全模式与工作台偏好。", "V0.1.1 暂未开放设置管理。"]
      }[kind];
      const workflowCard = kind === "workflow" && state.workflowSaved ? `
        <section class="mini-panel workflow-card">
          <span class="pill green">已保存工作流</span>
          <h2 style="margin-top:10px">前端问题修复</h2>
          <p class="muted">来源任务：修复登录页错误提示不显示，并补充测试。</p>
          <h3 style="margin-top:12px">包含步骤</h3>
          <ol>
            <li>阅读相关代码</li>
            <li>定位问题根因</li>
            <li>修复最小逻辑</li>
            <li>补充测试</li>
            <li>运行验证</li>
            <li>生成审查包</li>
          </ol>
          <div class="small-note">V0.1.1 仅展示保存结果，不开放真实工作流管理。</div>
        </section>
      ` : "";
      return layout(
        copy[0],
        "",
        `<section class="card placeholder">
          <h1>${copy[0]}</h1>
          <p>${copy[1]}</p>
          <p class="muted">${copy[2]}</p>
          ${workflowCard}
          <div class="toolbar" style="justify-content:center; margin-top:16px">
            <button class="primary" onclick="setPage('home')">返回首页</button>
          </div>
        </section>`
      );
    }

    function showConfirm(title, message, onConfirm) {
      window.pendingConfirm = onConfirm;
      showModal(`
        <h2>${title}</h2>
        <p class="muted">${message}</p>
        <div class="actions">
          <button onclick="closeModal()">取消</button>
          <button class="primary" onclick="window.pendingConfirm()">确认</button>
        </div>
      `);
    }

    function showModal(html) {
      document.getElementById("modal").innerHTML = html;
      document.getElementById("modalBackdrop").classList.add("show");
    }

    function closeModal() {
      document.getElementById("modalBackdrop").classList.remove("show");
      document.getElementById("modal").innerHTML = "";
      window.pendingConfirm = null;
    }

    function renderMain() {
      const pages = {
        home: homePage,
        plan: planPage,
        tasks: tasksPage,
        taskDetail: taskDetailPage,
        runDetail: runDetailPage,
        review: reviewPage,
        workflow: () => placeholderPage("workflow"),
        agents: () => placeholderPage("agents"),
        settings: () => placeholderPage("settings")
      };
      document.getElementById("main").innerHTML = pages[state.page]();
    }

    function render() {
      renderNav();
      renderRightbar();
      renderEventStream();
      renderMain();
    }

    document.getElementById("createGoal").addEventListener("click", () => {
      setPage("home");
      setTimeout(() => {
        const input = document.getElementById("goalInput");
        if (input) input.focus();
      }, 0);
    });

    render();
  </script>
</body>
</html>
